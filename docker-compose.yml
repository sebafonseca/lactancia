services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lactancia
      POSTGRES_USER: lactancia
      POSTGRES_PASSWORD: lactancia
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      DATABASE_URL: postgresql://lactancia:lactancia@db:5432/lactancia
      JWT_SECRET_KEY: dev-jwt-secret
      SECRET_KEY: dev-secret
      CORS_ORIGINS: http://localhost:5173
      DEV_ADMIN_EMAIL: devadmin@example.com
      ADMIN_EMAIL: asesora@example.com
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  db_data:
