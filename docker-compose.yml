services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lactancia
      POSTGRES_USER: lactancia
      POSTGRES_PASSWORD: lactancia
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      DATABASE_URL: postgresql://lactancia:lactancia@db:5432/lactancia
      JWT_SECRET_KEY: dev-jwt-secret
      SECRET_KEY: dev-secret
      CORS_ORIGINS: http://localhost:5173
      DEV_ADMIN_EMAIL: devadmin@example.com
      ADMIN_EMAIL: asesora@example.com
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    env_file:
      # Vars VITE_* (Cal.com, etc.): ver frontend/env.sample. `required: false` = compose funciona sin el archivo
      - path: ./frontend/.env
        required: false
    environment:
      # Desde el navegador en tu máquina el API es el puerto publicado del host
      VITE_API_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      # Codigo desde el host; node_modules solo en Linux (evita pisar con Mac + bug Rollup/npm)
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  db_data:
  frontend_node_modules:
